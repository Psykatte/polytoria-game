Name: Grabbable
BaseType: Instance
Description: Grabbable represents a object that can be dragged by user. It can
  be parented to Physical to give user ability to drag that object.
Remarks: null
Examples: null
SeeAlso: null
Properties:
  - Name: Force
    Type: number
    Description: Determines the force used to drag this object.
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
  - Name: MaxRange
    Type: number
    Description: Determines how far this object can be dragged.
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
  - Name: MaxGrabbableRange
    Type: number
    Description: Determines the max range that this object can be grabbed from.
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
  - Name: UseDragForce
    Type: boolean
    Description: Determines if dragging this object should affect physics.
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
  - Name: PermissionMode
    Type: GrabbablePermissionMode
    Description: Determines the permission mode for this grabber
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
  - Name: Dragger
    Type: Player
    Description: Returns the current dragger
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
  - Name: PermissionPredicate
    Type: () -> ()
    Description: >-
      A predicate function deciding whether this player can grab this object.
      `PermissionMode` must be set to `GrabbablePermissionMode.Scripted`


      Example usage:

      ```lua

      grabbable.PermissionMode = Enums.GrabbablePermissionMode.Scripted

      grabbable.PermissionPredicate = function(player)
        return player.Name == "Player1"
      end

      ```
    Remarks: null
    SeeAlso: null
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
Methods: []
Events:
  - Name: Grabbed
    Description: Fires when this object has been grabbed
    Parameters:
      - Name: player
        Type: Player
        Description: null
        IsOptional: false
        DefaultValue: null
    Arguments:
      Name: grabber
      Type: Player
  - Name: Released
    Description: Fires when this object has been released
    Parameters:
      - Name: player
        Type: Player
        Description: null
        IsOptional: false
        DefaultValue: null
    Arguments: ""
IsStatic: false
IsAbstract: false
IsInstantiable: true
StaticAlias: null
Category: physics

  - Name: GamepadA
    Description: "Game controller SDL button A. Corresponds to the bottom action
      button: Sony Cross, Xbox A, Nintendo B."
  - Name: GamepadB
    Description: "Game controller SDL button B. Corresponds to the right action
      button: Sony Circle, Xbox B, Nintendo A."
  - Name: GamepadX
    Description: "Game controller SDL button X. Corresponds to the left action
      button: Sony Square, Xbox X, Nintendo Y."
  - Name: GamepadY
    Description: "Game controller SDL button Y. Corresponds to the top action
      button: Sony Triangle, Xbox Y, Nintendo X."
  - Name: GamepadBack
    Description: Game controller SDL back button. Corresponds to the Sony Select,
      Xbox Back, Nintendo - button.
  - Name: GamepadGuide
    Description: Game controller SDL guide button. Corresponds to the Sony PS, Xbox
      Home button.
  - Name: GamepadStart
    Description: Game controller SDL start button. Corresponds to the Sony Options,
      Xbox Menu, Nintendo + button.
  - Name: GamepadLeftStick
    Description: Game controller SDL left stick button. Corresponds to the Sony L3,
      Xbox L/LS button.
  - Name: GamepadRightStick
    Description: Game controller SDL right stick button. Corresponds to the Sony R3,
      Xbox R/RS button.
  - Name: GamepadLeftShoulder
    Description: Game controller SDL left shoulder button. Corresponds to the Sony
      L1, Xbox LB button.
  - Name: GamepadRightShoulder
    Description: Game controller SDL right shoulder button. Corresponds to the Sony
      R1, Xbox RB button.
  - Name: GamepadDpadUp
    Description: Game controller D-pad up button.
  - Name: GamepadDpadDown
    Description: Game controller D-pad down button.
  - Name: GamepadDpadLeft
    Description: Game controller D-pad left button.
  - Name: GamepadDpadRight
    Description: Game controller D-pad right button.
  - Name: GamepadPaddle1
    Description: Game controller SDL paddle 1 button.
  - Name: GamepadPaddle2
    Description: Game controller SDL paddle 2 button.
  - Name: GamepadPaddle3
    Description: Game controller SDL paddle 3 button.
  - Name: GamepadPaddle4
    Description: Game controller SDL paddle 4 button.
  - Name: GamepadTouchpad
    Description: Game controller SDL touchpad button.
  - Name: MouseLeft
    Description: Primary mouse button, usually assigned to the left button.
  - Name: MouseRight
    Description: Secondary mouse button, usually assigned to the right button.
  - Name: MouseMiddle
    Description: Middle mouse button.
  - Name: MouseWheelUp
    Description: Mouse wheel scrolling up.
  - Name: MouseWheelDown
    Description: Mouse wheel scrolling down.
  - Name: MouseWheelLeft
    Description: Mouse wheel left button (only present on some mice).
  - Name: MouseWheelRight
    Description: Mouse wheel right button (only present on some mice).
  - Name: MouseXbutton1
    Description: Extra mouse button 1. This is sometimes present, usually to the
      sides of the mouse.
  - Name: MouseXbutton2
    Description: Extra mouse button 2. This is sometimes present, usually to the
      sides of the mouse.
  - Name: GamepadAxisLeftX
    Description: Game controller left joystick x-axis.
  - Name: GamepadAxisLeftY
    Description: Game controller left joystick y-axis.
  - Name: GamepadAxisRightX
    Description: Game controller right joystick x-axis.
  - Name: GamepadAxisRightY
    Description: Game controller right joystick y-axis.
  - Name: GamepadAxisTriggerLeft
    Description: Game controller left trigger axis.
  - Name: GamepadAxisTriggerRight
    Description: Game controller right trigger axis.
